<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="description" content="F1 Team Management System - Your ultimate Formula 1 analytics dashboard">
  <title>F1 Team Management System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --f1-black: #0a0a0c;
      --f1-dark-card: #0f0f14;
      --f1-elevated: #16161e;
      --f1-border: rgba(255,255,255,0.05);
      --f1-glow-red: #e10600;
      --f1-silver: #c0c0c0;
      --f1-white: #ffffff;
      --f1-muted: #8e8e9e;
      --f1-gradient: linear-gradient(135deg, #e10600 0%, #b00000 100%);
      --nav-height: 64px;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--f1-black); font-family: 'Inter','Space Grotesk',sans-serif; color: var(--f1-white); overflow-x: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--f1-dark-card); }
    ::-webkit-scrollbar-thumb { background: var(--f1-glow-red); border-radius: 10px; }

    /* ===== ANIMATED AUTH ===== */
    #authSection { min-height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; padding: 1rem; overflow: hidden; }

    .auth-bg { position: fixed; inset: 0; background: #050508; z-index: 0; overflow: hidden; }
    .auth-bg::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(225,6,0,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(80,0,200,0.12) 0%, transparent 55%);
      animation: bgPulse 6s ease-in-out infinite alternate;
    }
    @keyframes bgPulse { 0%{opacity:.7;transform:scale(1)} 100%{opacity:1;transform:scale(1.05)} }

    .auth-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(225,6,0,0.04) 1px,transparent 1px), linear-gradient(90deg,rgba(225,6,0,0.04) 1px,transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove { 0%{background-position:0 0} 100%{background-position:60px 60px} }

    .auth-scanline { position: absolute; inset: 0; background: repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 5px); pointer-events: none; z-index: 1; }

    .stripe {
      position: absolute; width: 2px;
      background: linear-gradient(to bottom, transparent, rgba(225,6,0,0.6), transparent);
      animation: stripeFall linear infinite; border-radius: 2px;
    }
    @keyframes stripeFall {
      0%   { transform: translateY(-100vh) rotate(25deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(200vh) rotate(25deg); opacity: 0; }
    }

    .speed-dot { position: absolute; border-radius: 50%; background: radial-gradient(circle,rgba(225,6,0,0.45),transparent 70%); animation: floatDot ease-in-out infinite; }
    @keyframes floatDot { 0%,100%{transform:translate(0,0) scale(1);opacity:.3} 50%{transform:translate(20px,-30px) scale(1.2);opacity:.7} }

    /* login card */
    .auth-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      background: rgba(10,10,15,0.88);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(225,6,0,0.35);
      border-radius: 28px;
      padding: 2.5rem 2rem;
      box-shadow: 0 0 0 1px rgba(225,6,0,0.1), 0 30px 60px rgba(0,0,0,0.7), 0 0 40px rgba(225,6,0,0.12);
      animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(32px) scale(0.97)} to{opacity:1;transform:none} }
    .auth-card::before {
      content: ''; position: absolute; top: -1px; left: 20%; right: 20%; height: 2px;
      background: linear-gradient(90deg,transparent,#e10600,#ff5c00,#e10600,transparent);
      border-radius: 2px; animation: edgeGlow 2s ease-in-out infinite alternate;
    }
    @keyframes edgeGlow { 0%{opacity:.5} 100%{opacity:1;box-shadow:0 0 12px #e10600} }

    .auth-logo-img { width: 72px; height: auto; filter: drop-shadow(0 0 10px rgba(225,6,0,0.6)); animation: logoPulse 3s ease-in-out infinite; }
    @keyframes logoPulse { 0%,100%{filter:drop-shadow(0 0 8px rgba(225,6,0,0.5))} 50%{filter:drop-shadow(0 0 18px rgba(225,6,0,0.9))} }

    .auth-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
    .auth-sub { color: var(--f1-muted); font-size: 0.85rem; }

    .auth-tab-btn {
      background: transparent; border: 1px solid rgba(225,6,0,0.3); color: var(--f1-muted);
      border-radius: 40px; padding: 7px 22px; font-size: 0.78rem; font-weight: 700; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
    }
    .auth-tab-btn.active, .auth-tab-btn:hover { background: var(--f1-glow-red); border-color: var(--f1-glow-red); color: #fff; box-shadow: 0 0 14px rgba(225,6,0,0.4); }

    .f1-input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 11px 14px; color: white; font-size: 0.9rem; transition: all 0.2s; outline: none;
    }
    .f1-input:focus { border-color: var(--f1-glow-red); background: rgba(225,6,0,0.06); box-shadow: 0 0 0 3px rgba(225,6,0,0.15); }
    .f1-input::placeholder { color: rgba(255,255,255,0.25); }
    .f1-label { font-size: 0.75rem; font-weight: 600; color: var(--f1-muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; display: block; }

    .btn-f1 {
      background: var(--f1-gradient); border: none; border-radius: 40px; padding: 13px 24px;
      font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; color: white; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 16px rgba(225,6,0,0.35); width: 100%;
    }
    .btn-f1:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(225,6,0,0.55); }

    .btn-outline-f1 { background: transparent; border: 1px solid var(--f1-glow-red); color: var(--f1-glow-red); border-radius: 40px; padding: 8px 20px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-outline-f1:hover { background: rgba(225,6,0,0.1); }

    .demo-hint { font-size: 0.72rem; color: rgba(255,255,255,0.25); text-align: center; margin-top: 12px; }

    /* ===== NAVBAR ===== */
    .navbar {
      background: rgba(8,8,11,0.96); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(225,6,0,0.3);
      height: var(--nav-height); position: fixed; top:0; left:0; width:100%; z-index:1030;
      display: flex; align-items: center;
    }
    .navbar-inner { display:flex; align-items:center; justify-content:space-between; width:100%; padding:0 1.25rem; gap:1rem; }
    .navbar-brand-wrapper { display:flex; align-items:center; gap:10px; text-decoration:none; flex-shrink:0; }
    .navbar-logo { height:38px; width:auto; object-fit:contain; filter:drop-shadow(0 0 4px rgba(225,6,0,0.4)); }
    .navbar-brand-text { font-weight:800; font-size:1.05rem; letter-spacing:-0.3px; background:linear-gradient(135deg,#fff 20%,#e10600 80%); -webkit-background-clip:text; background-clip:text; color:transparent; white-space:nowrap; line-height:1.2; }

    .nav-toggle { background:none; border:1px solid rgba(225,6,0,0.3); border-radius:10px; color:white; width:40px; height:40px; display:none; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:1.3rem; }

    .nav-menu { display:flex; align-items:center; gap:2px; list-style:none; }
    .nav-link { display:flex; align-items:center; gap:6px; color:rgba(255,255,255,0.65); font-weight:500; font-size:0.83rem; padding:7px 13px; border-radius:40px; text-decoration:none; transition:all 0.2s; white-space:nowrap; }
    .nav-link:hover, .nav-link.active { color:var(--f1-glow-red); background:rgba(225,6,0,0.1); }
    .nav-link.danger { color:#ff5555; }
    .nav-link.danger:hover { background:rgba(255,60,60,0.1); color:#ff5555; }

    @media(max-width:900px){
      .nav-toggle { display:flex; }
      .navbar-brand-text { font-size:0.85rem; }
      .navbar-logo { height:30px; }
      .nav-menu {
        display:none; position:fixed; top:var(--nav-height); left:0; right:0;
        background:rgba(8,8,11,0.98); backdrop-filter:blur(20px);
        border-bottom:1px solid rgba(225,6,0,0.2);
        flex-direction:column; padding:1rem; gap:4px; z-index:1029;
        max-height:calc(100vh - var(--nav-height)); overflow-y:auto;
      }
      .nav-menu.open { display:flex; }
      .nav-menu li { width:100%; }
      .nav-link { font-size:0.9rem; padding:10px 14px; border-radius:12px; }
    }
    @media(max-width:400px){ .navbar-brand-text { display:none; } }

    .navbar-spacer { height: var(--nav-height); }

    /* ===== PAGE CONTENT ===== */
    .page-content { padding:1.5rem 1rem 2rem; max-width:1400px; margin:0 auto; }
    @media(min-width:768px){ .page-content { padding:2rem 1.5rem 3rem; } }

    /* ===== TITLE ===== */
    .title-section { text-align:center; padding:1.5rem 1rem 1rem; position:relative; }
    .main-dashboard-title { font-size:clamp(1.8rem,6vw,4rem); font-weight:900; letter-spacing:-1px; background:linear-gradient(125deg,#fff 0%,#ffd1c0 35%,#e10600 75%,#ff5c00 100%); -webkit-background-clip:text; background-clip:text; color:transparent; font-family:'Space Grotesk',sans-serif; margin-bottom:0.3rem; }
    .title-badge { display:block; font-size:clamp(0.65rem,2vw,0.95rem); font-weight:500; text-transform:uppercase; letter-spacing:5px; background:linear-gradient(95deg,#ff8a6f,#ffcd94); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .title-section::after { content:''; display:block; width:60%; height:2px; background:linear-gradient(90deg,transparent,#e10600,#ff5e2e,transparent); margin:12px auto 0; border-radius:2px; }

    /* ===== HERO ===== */
    .hero-f1 { border-radius:24px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.6),0 0 0 1px rgba(225,6,0,0.2); margin-bottom:1.5rem; transition:transform 0.25s,box-shadow 0.3s; cursor:pointer; }
    .hero-f1:hover { transform:scale(1.005); box-shadow:0 28px 48px rgba(0,0,0,0.7),0 0 0 1px rgba(225,6,0,0.5); }
    .hero-img { width:100%; display:block; aspect-ratio:21/9; object-fit:cover; background:#020408; }
    @media(max-width:600px){ .hero-img { aspect-ratio:16/9; } }

    /* ===== STAT CARDS ===== */
    .stat-card { background:var(--f1-dark-card); border-radius:20px; border:1px solid var(--f1-border); padding:1.2rem; transition:all 0.25s; box-shadow:0 6px 18px rgba(0,0,0,0.3); height:100%; }
    .stat-card:hover { border-color:rgba(225,6,0,0.4); transform:translateY(-2px); }

    /* ===== KPI GRID ===== */
    .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.75rem; margin-bottom:1.5rem; }
    @media(max-width:600px){ .kpi-grid { grid-template-columns:repeat(2,1fr); } }
    .kpi-card { background:var(--f1-dark-card); border:1px solid var(--f1-border); border-radius:18px; padding:1rem 0.8rem; text-align:center; transition:all 0.2s; }
    .kpi-card:hover { border-color:rgba(225,6,0,0.4); transform:translateY(-2px); }
    .kpi-icon { font-size:1.8rem; display:block; margin-bottom:0.4rem; }
    .kpi-value { font-size:1.6rem; font-weight:800; line-height:1; }
    .kpi-label { font-size:0.68rem; color:var(--f1-muted); margin-top:4px; text-transform:uppercase; letter-spacing:0.5px; }

    /* ===== DRIVER MODAL ===== */
    .driver-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(8px);
    }
    .driver-modal-overlay.active {
      display: flex;
    }
    .driver-modal {
      background: linear-gradient(145deg, #1a1a24, #0f0f18);
      border: 1px solid rgba(225,6,0,0.4);
      border-radius: 24px;
      padding: 2rem;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 0 60px rgba(225,6,0,0.3);
      animation: modalIn 0.3s ease;
    }
    @keyframes modalIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .driver-modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(225,6,0,0.2);
      border: 1px solid rgba(225,6,0,0.4);
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 10;
    }
    .driver-modal-close:hover {
      background: var(--f1-glow-red);
      transform: rotate(90deg);
    }
    .driver-modal-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .driver-modal-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--f1-glow-red);
      box-shadow: 0 0 20px rgba(225,6,0,0.4);
    }
    .driver-modal-info h3 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.3rem;
    }
    .driver-modal-number {
      font-size: 3rem;
      font-weight: 900;
      color: var(--f1-glow-red);
      opacity: 0.3;
      position: absolute;
      top: 1rem;
      right: 4rem;
    }
    .driver-stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .driver-stat-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 0.75rem;
      text-align: center;
    }
    .driver-stat-box .stat-value {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--f1-glow-red);
    }
    .driver-stat-box .stat-label {
      font-size: 0.65rem;
      color: var(--f1-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .driver-bio {
      color: var(--f1-muted);
      font-size: 0.85rem;
      line-height: 1.6;
      margin-top: 1rem;
    }
    .driver-highlight {
      display: inline-block;
      background: linear-gradient(90deg, var(--f1-glow-red), #ff5c00);
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-top: 0.5rem;
    }
    .driver-modal-photo {
      width: 100%;
      border-radius: 12px;
      margin-top: 1rem;
      border: 2px solid rgba(225,6,0,0.3);
      object-fit: cover;
      max-height: 300px;
    }

    /* ===== VIDEO SECTION ===== */
    .video-wrapper {
      position: relative;
      width: 100%;
      background: #000;
    }
    .video-wrapper video {
      width: 100%;
      display: block;
      aspect-ratio: 16/9;
      object-fit: contain;
      background: #000;
    }

    /* ===== PLATFORM IMAGE ===== */
    .platform-image {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 1rem;
      border: 2px solid rgba(225,6,0,0.3);
      object-fit: cover;
      aspect-ratio: 16/9;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .platform-image:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 32px rgba(225,6,0,0.3);
    }

    /* ===== DRIVER CARDS ===== */
    .driver-card { 
      background:linear-gradient(145deg,#13131c,#0c0c12); 
      border-radius:18px; 
      border-left:3px solid var(--f1-glow-red); 
      padding:1rem; 
      display:flex; 
      align-items:center; 
      gap:1rem; 
      cursor: pointer;
      transition: all 0.3s;
    }
    .driver-card:hover {
      border-left-width: 6px;
      transform: translateX(3px);
      box-shadow: 0 5px 20px rgba(225,6,0,0.2);
    }
    .driver-avatar-img { width:72px; height:72px; border-radius:50%; object-fit:cover; border:2px solid var(--f1-glow-red); background:#0a0a12; box-shadow:0 0 12px rgba(225,6,0,0.3); flex-shrink:0; transition:transform 0.2s; }
    .driver-avatar-img:hover { transform:scale(1.05); }
    .driver-stats { display:flex; gap:1rem; margin-top:0.5rem; }
    .driver-stat-item small { display:block; color:var(--f1-muted); font-size:0.65rem; text-transform:uppercase; }
    .driver-stat-item .val { font-weight:700; font-size:0.95rem; }

    .badge-f1 { background:rgba(225,6,0,0.18); color:#ff7b6e; border-radius:40px; padding:3px 10px; font-size:0.68rem; font-weight:700; }

    /* ===== LAYOUTS ===== */
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:768px){ .two-col { grid-template-columns:1fr; } }
    .feature-row { display:grid; grid-template-columns:1fr 1.5fr; gap:1rem; margin-bottom:1.5rem; }
    @media(max-width:900px){ .feature-row { grid-template-columns:1fr; } }
    .bottom-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1.5rem; }
    @media(max-width:768px){ .bottom-row { grid-template-columns:1fr; } }
    .video-row { display:grid; grid-template-columns:1.5fr 1fr; gap:1rem; margin-top:1.5rem; }
    @media(max-width:900px){ .video-row { grid-template-columns:1fr; } }

    /* ===== NEXT RACE ===== */
    .nextrace-img { width:100%; aspect-ratio:16/7; object-fit:cover; border-radius:14px; border:1px solid var(--f1-glow-red); margin-bottom:0.75rem; }
    .schedule-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.5rem; margin-top:0.75rem; }
    .schedule-item { background:rgba(0,0,0,0.4); border-radius:12px; padding:0.6rem 0.4rem; text-align:center; transition:all 0.2s; }
    .schedule-item:hover { background:rgba(225,6,0,0.18); transform:translateY(-2px); }
    .schedule-day { font-size:0.62rem; text-transform:uppercase; letter-spacing:1px; color:var(--f1-glow-red); }
    .schedule-name { font-weight:700; font-size:0.78rem; margin:2px 0; }
    .schedule-date { font-size:0.62rem; color:#aaa; }
    .countdown-display { font-size:clamp(1.5rem,4vw,2rem); font-weight:800; color:var(--f1-glow-red); text-shadow:0 0 20px rgba(225,6,0,0.5); letter-spacing:2px; }

    /* ===== TABLES ===== */
    .table-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .table-f1 { width:100%; border-collapse:separate; border-spacing:0 6px; }
    .table-f1 thead th { background:rgba(0,0,0,0.4); color:var(--f1-silver); font-weight:600; font-size:0.72rem; letter-spacing:0.5px; padding:10px 14px; border:none; text-transform:uppercase; white-space:nowrap; }
    .table-f1 tbody tr { background:var(--f1-elevated); transition:0.2s; }
    .table-f1 tbody tr:hover { background:rgba(225,6,0,0.07); }
    .table-f1 tbody td { padding:12px 14px; border:none; vertical-align:middle; font-size:0.85rem; white-space:nowrap; }

    /* ===== RACES ===== */
    .races-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1rem; margin-bottom:2rem; }
    .race-card { background:linear-gradient(135deg,#111116,#0a0a0f); border-radius:18px; overflow:hidden; border:1px solid rgba(225,6,0,0.2); transition:all 0.3s; }
    .race-card:hover { transform:translateY(-4px); box-shadow:0 12px 28px rgba(225,6,0,0.18); border-color:var(--f1-glow-red); }
    .race-card-img { width:100%; height:150px; object-fit:cover; border-bottom:2px solid var(--f1-glow-red); }
    .race-card-body { padding:0.9rem; }
    .winner-badge { background:linear-gradient(90deg,#e10600,#ff4d2e); border-radius:20px; padding:3px 10px; font-size:0.68rem; font-weight:700; display:inline-block; }

    /* ===== CONSTRUCTORS ===== */
    .constructors-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1rem; }

      const diff = target - now;
      if(diff <= 0) {
        const cdDiv = document.getElementById('countdownTimer');
        if(cdDiv) cdDiv.innerHTML = `<span style="color:#4ef08c;">&#x1F3C1; RACE IN PROGRESS &#x1F3C1;</span>`;

      const days = Math.floor(diff/(1000*60*60*24));
      const hrs  = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
      const mins = Math.floor((diff%(1000*60*60))/(1000*60));
      const secs = Math.floor((diff%(1000*60))/1000);
      const cdDiv = document.getElementById('countdownTimer');
      if(cdDiv) cdDiv.innerHTML = `${days}d ${hrs}h ${mins}m ${secs}s`;
    }, 1000);
  }

  function filterDriversTable() {
    const search = document.getElementById("driverSearchInput")?.value.toLowerCase() || "";
    const team = document.getElementById("teamFilterSelect")?.value || "";
    const filtered = driversData.filter(d => d.name.toLowerCase().includes(search) && (team === "" || d.team === team));
    const tbody = document.getElementById("driversTableBody");
    if(tbody) tbody.innerHTML = filtered.map(d=>`<tr><td style="font-weight:700;color:var(--f1-glow-red);">${d.pos}</td><td>${d.nationality} ${d.name}</td><td>${d.team}</td><td style="font-weight:700;color:#f5c518;">${d.points}</td><td>${d.wins}</td><td>${d.podiums}</td></tr>`).join('');
  }
